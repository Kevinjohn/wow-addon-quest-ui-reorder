name: Package and release

# Build the addon zip with the BigWigs packager and publish it whenever a
# version tag (vX.Y.Z) is pushed. This runs the *same* packager as
# scripts/release.sh, so it honours .pkgmeta (package-as, the ignore list, and
# the curated manual-changelog).
#
# What happens on a tag push:
#   * Always: builds the zip and creates a GitHub Release with it attached
#     (GITHUB_TOKEN is provided automatically; the contents:write permission
#     below lets the packager create the release).
#   * CurseForge upload: happens only once BOTH the CF_API_TOKEN repo secret is
#     set AND `## X-Curse-Project-ID:` is present in QuestUIReorder.toc.
#   * Wago upload: happens only once BOTH the WAGO_API_TOKEN repo secret is set
#     AND `## X-Wago-ID:` is present in QuestUIReorder.toc.
# With neither configured, the packager simply skips those uploads, so this
# workflow is safe to merge before the CurseForge/Wago projects exist.
#
# To enable store uploads later:
#   1. Create the CurseForge / Wago projects, note their IDs.
#   2. Uncomment and fill ## X-Curse-Project-ID / ## X-Wago-ID in the .toc.
#   3. Add repo secrets CF_API_TOKEN and WAGO_API_TOKEN
#      (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - 'v*'

# The packager creates the GitHub Release, which needs write access to contents.
permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags so the packager can resolve @project-version@
          # and generate release metadata.
          fetch-depth: 0

      - name: Trim changelog header for published notes
        # The packager ships CHANGELOG.md verbatim as the GitHub Release body,
        # the CurseForge changelog, and the in-zip changelog. Drop the repo-file
        # header (the "# Changelog" title, its tagline, and the dev-notes HTML
        # comment) so the published notes start at the first version heading and
        # show the version list only. Keeps full history; just removes the
        # boilerplate. Runs on the CI checkout, so the committed CHANGELOG.md
        # keeps its header for anyone browsing the repo. The rule — "everything
        # from the first '## ' heading onward" — is independent of the exact
        # title/tagline wording, so edits to those can't break it.
        run: |
          awk '/^## / { keep = 1 } keep' CHANGELOG.md > CHANGELOG.trimmed
          mv CHANGELOG.trimmed CHANGELOG.md

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          # GitHub Release. The packager reads GITHUB_OAUTH; GITHUB_TOKEN is
          # injected automatically and works with the contents:write perm above.
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # CurseForge. packager@v2 reads the token from CF_API_KEY; CF_API_TOKEN
          # is only the name on the (unreleased) master branch. Pass the single
          # CF_API_TOKEN repo secret under BOTH names: it works on v2 now and
          # survives a later packager bump that switches to CF_API_TOKEN. Empty
          # (secret unset, or X-Curse-Project-ID missing) -> CurseForge skipped.
          CF_API_KEY: ${{ secrets.CF_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          # Wago. Empty -> Wago upload skipped.
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
