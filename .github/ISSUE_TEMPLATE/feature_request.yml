name: Feature request
description: Suggest an improvement or new behaviour
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the addon makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like it to do?
    validations:
      required: true
