name: Bug report
description: Something in the addon is wrong or broken
labels: [bug]
body:
  - type: input
    id: addon-version
    attributes:
      label: Addon version
      description: Shown on the in-game AddOns list, or on the Releases page.
      placeholder: e.g. 0.8.0
    validations:
      required: true
  - type: input
    id: wow-build
    attributes:
      label: WoW version / build
      description: "Run /run print(GetBuildInfo()) in-game, or read it from the game menu."
      placeholder: e.g. 12.0.5 (Retail)
    validations:
      required: true
  - type: input
    id: client-language
    attributes:
      label: Client language
      description: The language your WoW client runs in.
      placeholder: e.g. enUS, deDE, zhCN
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead? Section order, a quest in the wrong section, a missing or duplicated entry?
    validations:
      required: true
  - type: textarea
    id: quests
    attributes:
      label: Quests involved
      description: The quest names and the type tag the game shows for each ("Important", "Legendary", "Meta", "Repeatable", "Storyline"), as listed in your quest log.
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Track quests A, B, C
        2. Open the objective tracker (All Objectives)
        3. ...
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error text
      description: Turn on Lua errors with /console scriptErrors 1 (or use BugSack), then paste any error here. Also paste any orange "QuestUIReorder:" chat message exactly as shown.
      render: text
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: A shot of the objective tracker showing the problem helps a lot. Drag an image in here.
    validations:
      required: false
  - type: input
    id: reload
    attributes:
      label: Does /reload clear it?
      placeholder: e.g. yes / no / not tried
    validations:
      required: false
